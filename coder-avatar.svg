<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300">
  <defs>
    <linearGradient id="bgDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020810"/>
      <stop offset="100%" style="stop-color:#050d1a"/>
    </linearGradient>

    <linearGradient id="skinTone" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4956a"/>
      <stop offset="100%" style="stop-color:#c07e52"/>
    </linearGradient>

    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="60%" style="stop-color:#2d2d2d"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>

    <linearGradient id="shirtGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>

    <!-- Screen glow gradient -->
    <radialGradient id="screenGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#00C8FF;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#00C8FF;stop-opacity:0.05"/>
    </radialGradient>

    <!-- Blur filter for code -->
    <filter id="codeBlur">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>

    <filter id="softBlur">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>

    <!-- Glow for screen -->
    <filter id="screenGlowFilter">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip for laptop screen -->
    <clipPath id="laptopScreenClip">
      <rect x="260" y="90" width="180" height="120" rx="3"/>
    </clipPath>

    <!-- Scanlines -->
    <pattern id="scanlinesPat" x="0" y="0" width="1" height="3" patternUnits="userSpaceOnUse">
      <rect width="1" height="1.5" fill="rgba(0,200,255,0.05)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="500" height="300" fill="url(#bgDark)"/>

  <!-- Ambient glow from screen -->
  <ellipse cx="350" cy="150" rx="120" ry="90" fill="#00C8FF" opacity="0.03">
    <animate attributeName="opacity" values="0.03;0.07;0.03" dur="3s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Desk surface -->
  <rect x="80" y="230" width="380" height="15" rx="3" fill="#0d1a2a" stroke="#1a3040" stroke-width="1"/>
  <rect x="60" y="242" width="420" height="8" rx="2" fill="#0a1520"/>

  <!-- === LAPTOP === -->
  <!-- Laptop base (keyboard) -->
  <rect x="255" y="215" width="190" height="20" rx="4" fill="#111820" stroke="#1e2e40" stroke-width="1"/>
  <!-- Keyboard area -->
  <rect x="262" y="218" width="176" height="14" rx="2" fill="#0c1520"/>

  <!-- Keyboard keys - rows -->
  <!-- Row 1 -->
  <g fill="#182030" stroke="#243040" stroke-width="0.5">
    <rect x="265" y="219" width="8" height="5" rx="1"/>
    <rect x="275" y="219" width="8" height="5" rx="1"/>
    <rect x="285" y="219" width="8" height="5" rx="1"/>
    <rect x="295" y="219" width="8" height="5" rx="1"/>
    <rect x="305" y="219" width="8" height="5" rx="1"/>
    <rect x="315" y="219" width="8" height="5" rx="1"/>
    <rect x="325" y="219" width="8" height="5" rx="1"/>
    <rect x="335" y="219" width="8" height="5" rx="1"/>
    <rect x="345" y="219" width="8" height="5" rx="1"/>
    <rect x="355" y="219" width="8" height="5" rx="1"/>
    <rect x="365" y="219" width="8" height="5" rx="1"/>
    <rect x="375" y="219" width="8" height="5" rx="1"/>
    <rect x="385" y="219" width="8" height="5" rx="1"/>
    <rect x="395" y="219" width="8" height="5" rx="1"/>
    <rect x="405" y="219" width="8" height="5" rx="1"/>
    <rect x="415" y="219" width="8" height="5" rx="1"/>
    <rect x="425" y="219" width="8" height="5" rx="1"/>
  </g>
  <!-- Row 2 -->
  <g fill="#182030" stroke="#243040" stroke-width="0.5">
    <rect x="268" y="226" width="8" height="5" rx="1"/>
    <rect x="278" y="226" width="8" height="5" rx="1"/>
    <rect x="288" y="226" width="8" height="5" rx="1"/>
    <rect x="298" y="226" width="8" height="5" rx="1"/>
    <rect x="308" y="226" width="8" height="5" rx="1"/>
    <rect x="318" y="226" width="8" height="5" rx="1"/>
    <rect x="328" y="226" width="8" height="5" rx="1"/>
    <rect x="338" y="226" width="8" height="5" rx="1"/>
    <rect x="348" y="226" width="8" height="5" rx="1"/>
    <rect x="358" y="226" width="8" height="5" rx="1"/>
    <rect x="368" y="226" width="8" height="5" rx="1"/>
    <rect x="378" y="226" width="8" height="5" rx="1"/>
    <rect x="388" y="226" width="8" height="5" rx="1"/>
    <rect x="398" y="226" width="8" height="5" rx="1"/>
    <rect x="408" y="226" width="15" height="5" rx="1"/>
    <rect x="425" y="226" width="8" height="5" rx="1"/>
  </g>

  <!-- Key press animation - random key flashing -->
  <rect x="305" y="219" width="8" height="5" rx="1" fill="#00C8FF" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0;0;0;0" dur="0.6s" repeatCount="indefinite"/>
  </rect>
  <rect x="338" y="226" width="8" height="5" rx="1" fill="#00C8FF" opacity="0">
    <animate attributeName="opacity" values="0;0;0.7;0;0;0" dur="0.5s" begin="0.2s" repeatCount="indefinite"/>
  </rect>
  <rect x="368" y="219" width="8" height="5" rx="1" fill="#00C8FF" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0.6;0;0" dur="0.7s" begin="0.4s" repeatCount="indefinite"/>
  </rect>
  <rect x="285" y="226" width="8" height="5" rx="1" fill="#00C8FF" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;0.7;0" dur="0.55s" begin="0.1s" repeatCount="indefinite"/>
  </rect>
  <rect x="408" y="226" width="15" height="5" rx="1" fill="#00C8FF" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;0;0.5" dur="0.8s" begin="0.3s" repeatCount="indefinite"/>
  </rect>

  <!-- Laptop lid -->
  <rect x="258" y="85" width="184" height="130" rx="6" fill="#111820" stroke="#1e2e40" stroke-width="1.2"/>
  <!-- Screen bezel -->
  <rect x="263" y="90" width="174" height="120" rx="3" fill="#060f18"/>
  <!-- Screen content -->
  <rect x="263" y="90" width="174" height="120" rx="3" fill="url(#screenGlow)"/>

  <!-- CODE CONTENT - BLURRED -->
  <g clip-path="url(#laptopScreenClip)" filter="url(#codeBlur)">
    <!-- Code lines - blurry effect -->
    <text x="268" y="108" font-family="monospace" font-size="8" fill="#00C8FF" opacity="0.9">import neural_engine as ne</text>
    <text x="268" y="118" font-family="monospace" font-size="8" fill="#7B2FFF" opacity="0.8">from spectre import AutoAgent</text>
    <text x="268" y="128" font-family="monospace" font-size="8" fill="#aaaaaa" opacity="0.7"></text>
    <text x="268" y="138" font-family="monospace" font-size="8" fill="#00FFCC" opacity="0.9">class SpectreCore:</text>
    <text x="268" y="148" font-family="monospace" font-size="8" fill="#aaaaaa" opacity="0.8">  def __init__(self):</text>
    <text x="268" y="158" font-family="monospace" font-size="8" fill="#C840FF" opacity="0.8">    self.brain = ne.load()</text>
    <text x="268" y="168" font-family="monospace" font-size="8" fill="#00C8FF" opacity="0.8">    self.memory = []</text>
    <text x="268" y="178" font-family="monospace" font-size="8" fill="#7B2FFF" opacity="0.7">  def think(self, input):</text>
    <text x="268" y="188" font-family="monospace" font-size="8" fill="#aaaaaa" opacity="0.6">    return self.brain.infer(</text>
    <text x="268" y="198" font-family="monospace" font-size="8" fill="#00FFCC" opacity="0.9">      input, memory=self.memory)</text>

    <!-- Typing cursor -->
    <rect x="268" y="200" width="5" height="9" fill="#00C8FF" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0;0.9" dur="0.8s" repeatCount="indefinite"/>
    </rect>

    <!-- Scrolling new line animation -->
    <text x="268" y="208" font-family="monospace" font-size="8" fill="#C840FF" opacity="0">
      <animate attributeName="opacity" values="0;0;0;0.8;0" dur="2s" repeatCount="indefinite"/>
      def run(self): self.think(
    </text>

    <!-- Scanlines on screen -->
    <rect x="260" y="90" width="180" height="120" fill="url(#scanlinesPat)"/>
  </g>

  <!-- Screen frame highlight -->
  <rect x="263" y="90" width="174" height="2" rx="1" fill="rgba(0,200,255,0.2)"/>

  <!-- Laptop hinge -->
  <rect x="258" y="212" width="184" height="5" rx="2" fill="#0d1520" stroke="#1a2840" stroke-width="0.5"/>

  <!-- === AVATAR FIGURE === -->
  <!-- Body / torso (black shirt) -->
  <path d="M230,230 C210,225 195,210 190,190 L185,160 C185,155 190,150 200,148 L240,140 C245,138 255,137 265,137 L275,137 C285,137 295,138 300,140 L310,148 C320,150 315,155 315,160 L310,190 C305,210 290,225 270,230 Z"
    fill="url(#shirtGrad)" stroke="#1a1a1a" stroke-width="1"/>

  <!-- T-shirt collar -->
  <path d="M240,140 C245,135 255,132 265,132 C275,132 285,135 290,140"
    fill="none" stroke="#222222" stroke-width="1.5"/>

  <!-- LEFT ARM - extended towards keyboard -->
  <path d="M200,155 C185,158 170,165 165,175 L160,195 C158,200 162,205 168,204 L185,200 C190,198 192,193 193,188 L198,170"
    fill="url(#skinTone)" stroke="#b87050" stroke-width="0.5"/>
  <!-- Left sleeve -->
  <path d="M200,155 L198,170 C196,165 192,160 188,158 L195,148 Z"
    fill="#111111" stroke="#0a0a0a" stroke-width="0.5"/>
  <!-- Left hand on keyboard -->
  <ellipse cx="175" cy="220" rx="20" ry="10" fill="url(#skinTone)" stroke="#b87050" stroke-width="0.5" transform="rotate(-15, 175, 220)"/>
  <!-- Left fingers -->
  <path d="M158,217 C155,212 157,208 162,210" stroke="#b87050" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M165,213 C162,207 165,204 170,207" stroke="#b87050" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M172,211 C170,205 174,202 178,205" stroke="#b87050" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M179,212 C178,206 182,204 186,207" stroke="#b87050" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- RIGHT ARM - extended towards keyboard -->
  <path d="M300,155 C315,158 330,165 335,175 L340,195 C342,200 338,205 332,204 L315,200 C310,198 308,193 307,188 L302,170"
    fill="url(#skinTone)" stroke="#b87050" stroke-width="0.5"/>
  <!-- Right sleeve -->
  <path d="M300,155 L302,170 C304,165 308,160 312,158 L305,148 Z"
    fill="#111111" stroke="#0a0a0a" stroke-width="0.5"/>
  <!-- Right hand on keyboard -->
  <ellipse cx="325" cy="220" rx="20" ry="10" fill="url(#skinTone)" stroke="#b87050" stroke-width="0.5" transform="rotate(15, 325, 220)"/>
  <!-- Right fingers -->
  <path d="M342,217 C345,212 343,208 338,210" stroke="#b87050" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M335,213 C338,207 335,204 330,207" stroke="#b87050" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M328,211 C330,205 326,202 322,205" stroke="#b87050" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M321,212 C322,206 318,204 314,207" stroke="#b87050" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Arm typing animation -->
  <animateTransform xlink:href="[Not Supported - using separate elements]" attributeName="transform" type="translate" values="0,0;0,-1;0,0;0,-1;0,0" dur="0.3s" repeatCount="indefinite"/>

  <!-- NECK -->
  <rect x="255" y="110" width="30" height="32" rx="6" fill="url(#skinTone)" stroke="#b87050" stroke-width="0.5"/>

  <!-- HEAD - oval, no face features -->
  <ellipse cx="265" cy="95" rx="42" ry="40" fill="url(#skinTone)" stroke="#b87050" stroke-width="0.8"/>

  <!-- WOLF CUT HAIR -->
  <!-- Top hair mass -->
  <path d="M223,78 C220,60 228,42 248,35 C258,31 275,30 285,34 C300,40 308,55 305,72 C300,65 295,60 285,58 C278,56 275,55 270,56 C265,55 260,55 255,56 C245,60 240,65 235,72 C233,69 228,73 223,78 Z"
    fill="url(#hairGrad)"/>

  <!-- Wolf cut - textured layers on top -->
  <path d="M225,68 C228,55 235,46 248,42 C255,39 260,38 265,38 C270,38 278,39 285,43 C295,48 300,57 300,68 C295,62 288,58 280,57 C272,56 268,55 265,55 C260,55 255,56 250,57 C242,59 235,63 228,70 Z"
    fill="#222222" opacity="0.7"/>

  <!-- Wolf cut side pieces - left (falling forward) -->
  <path d="M223,78 C215,85 210,95 208,108 C212,105 216,100 222,96 C226,90 228,84 230,80 Z"
    fill="url(#hairGrad)"/>
  <path d="M223,78 C218,88 215,100 216,112 C218,108 220,100 224,94 C227,87 228,82 230,80 Z"
    fill="#1a1a1a"/>
  <!-- Wolf cut side pieces - right (falling forward) -->
  <path d="M307,78 C315,85 320,95 322,108 C318,105 314,100 308,96 C304,90 302,84 300,80 Z"
    fill="url(#hairGrad)"/>
  <path d="M307,78 C312,88 315,100 314,112 C312,108 310,100 306,94 C303,87 302,82 300,80 Z"
    fill="#1a1a1a"/>

  <!-- Wolf cut back/bottom - longer layers -->
  <path d="M225,100 C215,105 210,118 212,130 C215,125 218,120 224,116 C228,110 228,105 228,102 Z"
    fill="url(#hairGrad)"/>
  <path d="M305,100 C315,105 320,118 318,130 C315,125 312,120 306,116 C302,110 302,105 302,102 Z"
    fill="url(#hairGrad)"/>

  <!-- Hair texture strands -->
  <path d="M235,40 C237,45 236,52 238,58" stroke="#333333" stroke-width="1" fill="none" opacity="0.7"/>
  <path d="M250,36 C251,43 250,52 252,60" stroke="#333333" stroke-width="1" fill="none" opacity="0.7"/>
  <path d="M265,35 C265,42 264,52 265,60" stroke="#333333" stroke-width="1" fill="none" opacity="0.7"/>
  <path d="M278,36 C278,43 279,52 278,60" stroke="#333333" stroke-width="1" fill="none" opacity="0.7"/>
  <path d="M290,40 C291,47 290,55 289,62" stroke="#333333" stroke-width="1" fill="none" opacity="0.7"/>

  <!-- Wispy front pieces from wolf cut -->
  <path d="M230,75 C225,80 222,90 224,100" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>
  <path d="M235,70 C228,78 226,90 228,102" stroke="#222222" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M300,75 C305,80 308,90 306,100" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>
  <path d="M295,70 C302,78 304,90 302,102" stroke="#222222" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- NO EYES, NOSE, MOUTH - just the face border (already drawn as the head ellipse) -->
  <!-- Subtle ear hint -->
  <ellipse cx="223" cy="95" rx="6" ry="9" fill="#c07e52" stroke="#b87050" stroke-width="0.5"/>
  <ellipse cx="307" cy="95" rx="6" ry="9" fill="#c07e52" stroke="#b87050" stroke-width="0.5"/>

  <!-- Screen light reflection on face -->
  <ellipse cx="252" cy="90" rx="20" ry="18" fill="#00C8FF" opacity="0.04">
    <animate attributeName="opacity" values="0.04;0.09;0.04" dur="2s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Subtle shoulder definition -->
  <path d="M190,148 C185,145 180,150 182,158 C184,165 195,170 200,168"
    fill="url(#shirtGrad)" stroke="#111111" stroke-width="0.5"/>
  <path d="M340,148 C345,145 350,150 348,158 C346,165 335,170 330,168"
    fill="url(#shirtGrad)" stroke="#111111" stroke-width="0.5"/>

  <!-- Ambient floor/desk glow -->
  <ellipse cx="250" cy="248" rx="150" ry="8" fill="#00C8FF" opacity="0.04"/>

  <!-- Corner tag -->
  <text x="10" y="290" fill="#00C8FF" font-family="monospace" font-size="8" opacity="0.3">@DARKUS39 // AYANOKOUJI</text>
</svg>
